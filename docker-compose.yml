version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: inkvault_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inkvault
      POSTGRES_PASSWORD: inkvault_dev_password
      POSTGRES_DB: inkvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inkvault"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inkvault_redis
    restart: unless-stopped
    command: redis-server --requirepass inkvault_redis_dev --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "inkvault_redis_dev", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: inkvault_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: inkvault_minio
      MINIO_ROOT_PASSWORD: inkvault_minio_dev_password
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Uncomment for local email testing
  # mailhog:
  #   image: mailhog/mailhog:latest
  #   container_name: inkvault_mailhog
  #   ports:
  #     - "1025:1025"   # SMTP
  #     - "8025:8025"   # Web UI

volumes:
  postgres_data:
  redis_data:
  minio_data:
